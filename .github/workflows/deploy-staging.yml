name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Sigma rules to staging
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      
      - name: Download build artifact from CI
        id: download-artifact
        if: ${{ github.event_name == 'workflow_run' }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: converted-rules
          path: converted-rules
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Staging
        run: |
          if [ -d converted-rules ] && [ -n "$(find converted-rules -mindepth 1 -maxdepth 3 -type f -print -quit)" ]; then
            echo "Deploying converted-rules to staging..."
            find converted-rules -type f | sort
          else
            echo "No converted-rules artifact was available; using placeholder deployment."
          fi
          # Add deployment here
