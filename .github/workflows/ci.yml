name: CI

on: 
  pull_request: 
    paths: 
      - "rules/**"
      - ".github/workflows/**"
  
  push: 
    branches: 
      - main
    paths: 
      - "rules/**"
      - ".github/workflows/**"

  workflow_dispatch:

permissions:
  contents: read

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Schema & YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with: 
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect changed rule files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with: 
          files: |
            rules/**/*.yml
            rules/**/*.yaml
          separator: "\n"
      
      - name: Show changed files
        env: 
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "Changed file: $file"
          done

      - name: Validate YAML files
        if: steps.changed-files.outputs.any_changed == 'true'
        env: 
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "Validating YAML file: $file"
            yamllint "$file"
          done

      - name: Validate Sigma schema
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: SigmaHQ/sigma-rules-validator@v1
        with:
          paths: |-
            ./rules
          schemaURL: https://raw.githubusercontent.com/SigmaHQ/sigma-specification/refs/heads/main/json-schema/sigma-detection-rule-schema.json

      - name: Convert Sigma Rules to Kusto
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          mkdir -p out/KQL
          for file in ${ALL_CHANGED_FILES}; do
            base=$(basename "$file")
            stem="${base%.*}"
            sigma convert -t kusto "$file" > "out/KQL/${stem}.kql" 2> "out/KQL/${stem}.log"
          done

      - name: Keep only specific directory changes
        run: |
          git restore --source=HEAD --staged --worktree -- .
          git clean -fdx -e out/KQL/
          git add out/KQL

      - name: Create Pull Request
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update KQL rules from latest Sigma rules'
          branch: update-sigma-rules-${{ github.run_number }}
          delete-branch: true
          title: 'Update KQL Rules from Sigma Repository'
          body: |
            ## Automated Sigma to KQL Conversion
            
            This PR contains updated KQL rules converted from the latest Sigma rules repository.
            
            ### Changes
            - Updated KQL rules
            - Conversion date: ${{ github.event.repository.updated_at }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### Review Checklist
            - [ ] Review changed rules for accuracy
            - [ ] Verify new rules are properly formatted
            - [ ] Check for any failed conversions in workflow logs
            
            ---
            *This PR was automatically created by the CI workflow.*
          reviewers: ${{ github.repository_owner }}
